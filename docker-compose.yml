services:
  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ./app:/app/app
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    command: celery -A app.tasks.celery_app worker --loglevel=INFO
    depends_on:
      - redis
    volumes:
      - ./app:/app/app
    restart: unless-stopped

  beat:
    build: .
    env_file: .env
    command: celery -A app.tasks.celery_app beat --loglevel=INFO
    depends_on:
      - redis
    volumes:
      - ./app:/app/app
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

# O SQL Server é externo (servidor Windows do SAP B1 ou instância dedicada),
# não é provisionado por este compose. Ajuste DB_SERVER no .env.
